# New-API Docker Compose Configuration
#
# Quick Start:
#   1. docker-compose up -d
#   2. Access at http://localhost:3000
#
# Using MySQL instead of PostgreSQL:
#   1. Comment out the postgres service and SQL_DSN line 15
#   2. Uncomment the mysql service and SQL_DSN line 16
#   3. Uncomment mysql in depends_on (line 28)
#   4. Uncomment mysql_data in volumes section (line 64)
#
# ⚠️  IMPORTANT: Change all default passwords before deploying to production!

version: '3.4' # For compatibility with older Docker versions

services:
  new-api:
    image: handsomeqin/new-api-cyberpunk:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - '80:3000'
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
        - SQL_DSN=postgresql://root:123457@postgres:5432/new-api
        - REDIS_CONN_STRING=redis://redis:6379/0   # 加端口和 /0，更可靠（你原来是 redis://redis，也能行，但建议改）
        - SESSION_SECRET=superlongrandomkeyfornewsession2026xyz1234567890abcdef   # ← 这里！必须加，解决 securecookie error
        - CRYPTO_SECRET=anotherverystrongcryptokeyforredisencrypt987654321fedcba     # ← 这里！Redis 加密必备
        - ERROR_LOG_ENABLED=false                  # 改成 false，减少日志写盘 IO（原来是 true，很可能加重卡顿）
        - TZ=Asia/Shanghai
        - BATCH_UPDATE_ENABLED=true
  # 强烈建议再加这几行防卡（项目支持，优化流式和大请求）
        - STREAMING_TIMEOUT=180                    # 缩短超时，防上游挂起卡住
        - STREAM_SCANNER_MAX_BUFFER_MB=32          # 缓冲区减半，防 OOM
        - MAX_REQUEST_BODY_MB=16                   # 限制请求体大小，防内存爆



      #- SQL_DSN=postgresql://root:123457@postgres:5432/new-api # ⚠️ IMPORTANT: Change the password in production!
      #      - SQL_DSN=root:123456@tcp(mysql:3306)/new-api  # Point to the mysql service, uncomment if using MySQL
      #- REDIS_CONN_STRING=redis://redis
     # - TZ=Asia/Shanghai
      #- ERROR_LOG_ENABLED=true # 是否启用错误日志记录
      #- BATCH_UPDATE_ENABLED=true # 是否启用批量更新 batch update enabled
    #      - STREAMING_TIMEOUT=300  # 流模式无响应超时时间，单位秒，默认120秒，如果出现空补全可以尝试改为更大值 Streaming timeout in seconds, default is 120s. Increase if experiencing empty completions
    #      - SESSION_SECRET=random_string  # 多机部署时设置，必须修改这个随机字符串！！ multi-node deployment, set this to a random string!!!!!!!
    #      - SYNC_FREQUENCY=60  # Uncomment if regular database syncing is needed

    depends_on:
      - redis
      - postgres
    #      - mysql  # Uncomment if using MySQL
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123457 # ⚠️ IMPORTANT: Change this password in production!
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data
#    ports:
#      - "5432:5432"  # Uncomment if you need to access PostgreSQL from outside Docker

#  mysql:
#    image: mysql:8.2
#    container_name: mysql
#    restart: always
#    environment:
#      MYSQL_ROOT_PASSWORD: 123456  # ⚠️ IMPORTANT: Change this password in production!
#      MYSQL_DATABASE: new-api
#    volumes:
#      - mysql_data:/var/lib/mysql
#    ports:
#      - "3306:3306"  # Uncomment if you need to access MySQL from outside Docker

volumes:
  pg_data:
#  mysql_data: